name: Deploy website to GitHub Pages

on:
  push:
    branches:
      - main
      - master

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Cai Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cai thu vien
        run: npm ci

      - name: Kiem tra loi TypeScript
        run: npm run lint

      - name: Build website
        run: npm run build

      - name: Cau hinh GitHub Pages
        uses: actions/configure-pages@v5

      - name: Tai file build len Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy len GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
